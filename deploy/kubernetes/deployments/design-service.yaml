apiVersion: apps/v1
kind: Deployment
metadata:
  name: design-service
  namespace: clawflgma
  labels:
    app: design-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: design-service
  template:
    metadata:
      labels:
        app: design-service
        annotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "5004"
          prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: design-service
        image: clawflgma/design-service:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 5004
          protocol: TCP
        env:
        - name: ASPNETCORE_URLS
          value: "http://+:5004"
        - name: ASPNETCORE_ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: clawflgma-config
              key: ASPNETCORE_ENVIRONMENT
        - name: ConnectionStrings__MongoDB
          valueFrom:
            secretKeyRef:
              name: clawflgma-secrets
              key: mongodb-connection-string
        - name: ConnectionStrings__Redis
          valueFrom:
            secretKeyRef:
              name: clawflgma-secrets
              key: redis-connection-string
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health/live
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health/ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: design-service
  namespace: clawflgma
  labels:
    app: design-service
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: design-service
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: design-service-hpa
  namespace: clawflgma
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: design-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
