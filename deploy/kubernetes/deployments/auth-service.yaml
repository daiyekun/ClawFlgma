apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: clawflgma
  labels:
    app: auth-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        annotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "5001"
          prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: auth-service
        image: clawflgma/auth-service:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 5001
          protocol: TCP
        env:
        - name: ASPNETCORE_URLS
          value: "http://+:5001"
        - name: ASPNETCORE_ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: clawflgma-config
              key: ASPNETCORE_ENVIRONMENT
        - name: ConnectionStrings__DefaultConnection
          valueFrom:
            secretKeyRef:
              name: clawflgma-secrets
              key: postgres-connection-string
        - name: ConnectionStrings__Redis
          valueFrom:
            secretKeyRef:
              name: clawflgma-secrets
              key: redis-connection-string
        - name: JWT__Issuer
          valueFrom:
            configMapKeyRef:
              name: clawflgma-config
              key: JWT__Issuer
        - name: JWT__Audience
          valueFrom:
            configMapKeyRef:
              name: clawflgma-config
              key: JWT__Audience
        - name: JWT__ExpirationMinutes
          valueFrom:
            configMapKeyRef:
              name: clawflgma-config
              key: JWT__ExpirationMinutes
        - name: JWT__SecretKey
          valueFrom:
            secretKeyRef:
              name: clawflgma-secrets
              key: jwt-secret-key
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health/live
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: clawflgma
  labels:
    app: auth-service
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: auth-service
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth-service-hpa
  namespace: clawflgma
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auth-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
