apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: clawflgma-ingress
  namespace: clawflgma
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.clawflgma.com
    secretName: clawflgma-tls
  rules:
  - host: api.clawflgma.com
    http:
      paths:
      - path: /auth(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: auth-service
            port:
              number: 80
      - path: /design(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: design-service
            port:
              number: 80
      - path: /collab(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: collab-service
            port:
              number: 80
      - path: /project(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: project-service
            port:
              number: 80
      - path: /asset(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: asset-service
            port:
              number: 80
      - path: /user(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: user-service
            port:
              number: 80
      - path: /notification(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: notification-service
            port:
              number: 80
      - path: /ai(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: ai-service
            port:
              number: 80
      - path: /(.*)
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              number: 80
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: clawflgma
  labels:
    app: api-gateway
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
  selector:
    app: api-gateway
